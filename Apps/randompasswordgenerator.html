<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Absolutely Random Password Generator</title>
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f4f7f8;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        padding: 25px;
      }
      .container {
        background: white;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
        border-radius: 12px;
        width: 360px;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      h1 {
        margin: 0 0 1rem 0;
        color: #5C6AC4;
        font-weight: 700;
      }
      .flex {
        display: flex;
        align-items: center;
      }
      input[type="text"] {
        flex: 1;
        padding: 0.65rem 1rem;
        font-size: 1.15rem;
        border: 2px solid #ddd;
        border-radius: 6px 0 0 6px;
        outline: none;
        transition: border-color 0.3s ease;
      }
      input[type="text"]:focus {
        border-color: #5C6AC4;
        box-shadow: 0 0 6px #5C6AC4aa;
      }
      button {
        background-color: #5C6AC4;
        color: white;
        border: none;
        padding: 0.65rem 1rem;
        font-size: 1rem;
        cursor: pointer;
        border-radius: 0 6px 6px 0;
        transition: background-color 0.3s ease;
        user-select: none;
      }
      button:hover {
        background-color: #4b52a4;
      }
      #copy-button {
        border-radius: 6px;
        margin-left: 0.5rem;
        padding: 0.5rem 1rem;
        flex-shrink: 0;
      }
      .options {
        margin-top: 1rem;
        width: 100%;
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: space-between;
      }
      .option-item {
        display: flex;
        align-items: center;
        font-size: 0.9rem;
        user-select: none;
      }
      .option-item input[type="checkbox"] {
        margin-right: 0.3rem;
        cursor: pointer;
      }
      #length-input {
        width: 60px;
        padding: 0.4rem;
        border: 2px solid #ddd;
        border-radius: 6px;
        font-size: 1rem;
        text-align: center;
        outline: none;
        transition: border-color 0.3s ease;
      }
      #length-input:focus {
        border-color: #5C6AC4;
        box-shadow: 0 0 6px #5C6AC4aa;
      }
      .copied {
        margin-top: 1rem;
        color: #3a9d23;
        font-weight: 600;
        opacity: 0;
        transition: opacity 0.3s ease;
        user-select: none;
      }
      @media (max-width: 420px) {
        .container {
          width: 95%;
          padding: 1.5rem;
        }
        button, #copy-button {
          padding: 0.55rem 0.8rem;
          font-size: 0.9rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Generate Password</h1>
      <div class="flex" style="width: 100%">
        <input type="text" id="input-el" readonly placeholder="Your password will appear here" />
        <button id="copy-button" title="Copy to clipboard">Copy</button>
      </div>
      <div class="flex" style="width: 100%; margin-top: 1rem;">
        <button id="generate-button" style="flex:1;">Generate Password</button>
      </div>
      <div class="options">
        <label class="option-item"><input type="checkbox" id="lowercase" checked /> Lowercase</label>
        <label class="option-item"><input type="checkbox" id="uppercase" checked /> Uppercase</label>
        <label class="option-item"><input type="checkbox" id="numbers" checked /> Numbers</label>
        <label class="option-item"><input type="checkbox" id="symbols" checked /> Symbols</label>
        <label class="option-item" style="margin-left:auto;">
          Length: 
          <input type="number" id="length-input" min="4" max="32" value="12" title="Choose password length" />
        </label>
      </div>
      <p class="copied" id="copied-msg">Copied to clipboard!</p>
    </div>

    <script>
      const inputEl = document.getElementById('input-el');
      const copyButton = document.getElementById('copy-button');
      const generateButton = document.getElementById('generate-button');
      const copiedMsg = document.getElementById('copied-msg');
      const lengthInput = document.getElementById('length-input');
      const chkLower = document.getElementById('lowercase');
      const chkUpper = document.getElementById('uppercase');
      const chkNumbers = document.getElementById('numbers');
      const chkSymbols = document.getElementById('symbols');

      const charSets = {
        lowercase: 'abcdefghijklmnopqrstuvwxyz',
        uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
        numbers: '0123456789',
        symbols: '@#$%&*()_+-=[]{}|;:,.<>?/'
      };

      function generatePassword() {
        let length = parseInt(lengthInput.value, 10);
        if (isNaN(length) || length < 4) {
          length = 4;
          lengthInput.value = length;
        } else if (length > 32) {
          length = 32;
          lengthInput.value = length;
        }

        let availableChars = '';
        if (chkLower.checked) availableChars += charSets.lowercase;
        if (chkUpper.checked) availableChars += charSets.uppercase;
        if (chkNumbers.checked) availableChars += charSets.numbers;
        if (chkSymbols.checked) availableChars += charSets.symbols;

        if (availableChars.length === 0) {
          alert('Please select at least one character set!');
          return;
        }

        let password = '';
        for (let i = 0; i < length; i++) {
          password += availableChars.charAt(Math.floor(Math.random() * availableChars.length));
        }

        inputEl.value = password;
      }

      generateButton.addEventListener('click', generatePassword);

      copyButton.addEventListener('click', () => {
        if (!inputEl.value) {
          alert('No password to copy! Generate one first.');
          return;
        }
        navigator.clipboard.writeText(inputEl.value).then(() => {
          copiedMsg.style.opacity = '1';
          setTimeout(() => { copiedMsg.style.opacity = '0'; }, 1500);
        }, () => {
          alert('Failed to copy to clipboard.');
        });
      });
    </script>
  </body>
</html>
