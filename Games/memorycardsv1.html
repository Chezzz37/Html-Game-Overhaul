<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Memory Card Game - Choose Your Theme</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      color: #2c3e50;
    }

    .title {
      font-size: 2.5rem;
      margin-bottom: 15px;
      font-weight: 700;
    }

    .controls {
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    select, button {
      padding: 8px 15px;
      font-size: 1rem;
      border: 2px solid #5c6ac4;
      border-radius: 8px;
      background: white;
      color: #5c6ac4;
      cursor: pointer;
      transition: background-color 0.3s, color 0.3s;
    }

    select:focus, button:focus {
      outline: none;
      border-color: #3a4bcf;
      box-shadow: 0 0 5px #3a4bcf;
    }

    button:hover {
      background-color: #5c6ac4;
      color: white;
    }

    .stats {
      margin-bottom: 15px;
      font-weight: 600;
      font-size: 1.1rem;
      gap: 25px;
      display: flex;
    }

    .game-board {
      width: 360px;
      max-width: 90vw;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-gap: 12px;
      perspective: 1000px;
    }

    .card {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 12px;
      cursor: pointer;
      user-select: none;
      box-shadow: 0 4px 10px rgb(0 0 0 / 0.1);
      transform-style: preserve-3d;
      transition: transform 0.6s ease;
      background: transparent;  /* transparent so front white card shows */
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card.matched {
      pointer-events: none;
      filter: brightness(1.15);
      box-shadow: 0 0 15px 3px #38b000;
      cursor: default;
    }

    .card.matched .back {
      visibility: hidden !important;
    }

    .card .front, .card .back {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.7rem;
      user-select: none;
      top: 0;
      left: 0;
    }

    .card .front {
      background: white;
      border: 2px solid #5c6ac4;
      color: #2c3e50;
      transform: rotateY(180deg);
      z-index: 2;
    }

    .card .back {
      background: #5c6ac4;
      color: white;
      z-index: 1;
    }

    @media (max-width: 400px) {
      .game-board {
        width: 100vw;
        grid-gap: 10px;
      }
      .card {
        width: 20vw;
        height: 20vw;
      }
    }
  </style>
</head>
<body>
  <h1 class="title">Memory Card Game</h1>

  <div class="controls">
    <label for="themeSelect">Choose Theme:</label>
    <select id="themeSelect" aria-label="Select card theme"></select>
    <button id="restartBtn" aria-label="Restart Game">Restart</button>
  </div>

  <div class="stats">
    <span>Moves: <span id="moveCount">0</span></span>
    <span>Matches: <span id="matchCount">0</span>/8</span>
  </div>

  <div id="gameBoard" class="game-board" aria-live="polite"></div>

  <script>
    const themes = {
      "Animals": ["🐶", "🐱", "🐭", "🐹", "🐰", "🦊", "🐻", "🐼"],
      "Fruits": ["🍎", "🍊", "🍌", "🍇", "🍉", "🍓", "🍒", "🥝"],
      "Flags": ["🇺🇸", "🇬🇧", "🇫🇷", "🇩🇪", "🇮🇹", "🇯🇵", "🇨🇦", "🇧🇷"],
      "Space": ["🌑", "🌕", "🪐", "🚀", "🛸", "🛰️", "👾", "🌟"],
      "Sports": ["⚽", "🏀", "🏈", "🎾", "🏐", "🥊", "🏓", "🏹"],
      "Faces": ["😀", "😂", "🥰", "😎", "🤩", "😡", "😭", "🤯"],
      "Vehicles": ["🚗", "🚕", "🚜", "🚒", "🛵", "🚀", "🛳️", "🚂"],
      "Plants": ["🌵", "🌴", "🌻", "🌺", "🌼", "🌷", "🍀", "🍁"],
      "Shapes": ["🔺", "🔵", "⬛", "⭐", "⭕", "⬜", "🌟", "🔶"],
      "Music": ["🎵", "🎸", "🎧", "🎤", "🎷", "🥁", "🎹", "📯"],
      "Halloween": ["🎃", "🕸️", "🦇", "👻", "🪦", "🧙‍♀️", "🧛‍♂️", "🍬"],
      "Underwater": ["🐠", "🐟", "🐬", "🐙", "🦈", "🦀", "🐡", "🐚"],
      "Weather": ["☀️", "🌧️", "⛈️", "❄️", "🌪️", "🌈", "🌤️", "💨"],
      "Food": ["🍔", "🍕", "🍣", "🍩", "🍪", "🌭", "🥗", "🍜"],
      "Colors": ["🔴", "🟠", "🟡", "🟢", "🔵", "🟣", "⚫", "⚪"]
    };

    const BOARD_SIZE = 16; // 8 pairs

    const themeSelect = document.getElementById('themeSelect');
    const gameBoard = document.getElementById('gameBoard');
    const moveCountSpan = document.getElementById('moveCount');
    const matchCountSpan = document.getElementById('matchCount');
    const restartBtn = document.getElementById('restartBtn');

    let moves = 0;
    let matches = 0;
    let firstCard = null, secondCard = null;
    let lockBoard = false;
    let cardsData = [];

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function createCardElement(symbol, index) {
      const card = document.createElement('div');
      card.classList.add('card');
      card.dataset.symbol = symbol;
      card.dataset.index = index;

      card.innerHTML = `
        <div class="front">${symbol}</div>
        <div class="back">?</div>
      `;

      card.addEventListener('click', () => {
        if (lockBoard) return;
        if (card === firstCard) return; // no double click

        if (!card.classList.contains('flipped')) {
          flipCard(card);
        }
      });

      return card;
    }

    function flipCard(card) {
      if (lockBoard) return;
      card.classList.add('flipped');

      if (!firstCard) {
        firstCard = card;
        return;
      }

      secondCard = card;
      moves++;
      moveCountSpan.textContent = moves;

      checkForMatch();
    }

    function checkForMatch() {
      const isMatch = firstCard.dataset.symbol === secondCard.dataset.symbol;
      if (isMatch) {
        matches++;
        matchCountSpan.textContent = matches;
        firstCard.classList.add('matched', 'flipped');
        secondCard.classList.add('matched', 'flipped');

        resetBoard();

        if (matches === BOARD_SIZE / 2) {
          setTimeout(() => alert(`You won in ${moves} moves! 🎉`), 300);
        }
      } else {
        lockBoard = true;
        setTimeout(() => {
          firstCard.classList.remove('flipped');
          secondCard.classList.remove('flipped');
          resetBoard();
        }, 1000);
      }
    }

    function resetBoard() {
      [firstCard, secondCard] = [null, null];
      lockBoard = false;
    }

    function initThemes() {
      for (const themeName in themes) {
        const option = document.createElement('option');
        option.value = themeName;
        option.textContent = themeName;
        themeSelect.appendChild(option);
      }
      themeSelect.selectedIndex = 0;
    }

    function setupGame() {
      moves = 0;
      matches = 0;
      moveCountSpan.textContent = moves;
      matchCountSpan.textContent = matches;
      resetBoard();
      gameBoard.innerHTML = '';

      const selectedTheme = themeSelect.value;
      const symbols = themes[selectedTheme];
      cardsData = shuffle([...symbols, ...symbols]); // double the symbols and shuffle

      cardsData.forEach((symbol, i) => {
        const cardElement = createCardElement(symbol, i);
        gameBoard.appendChild(cardElement);
      });
    }

    // Event Listeners
    themeSelect.addEventListener('change', setupGame);
    restartBtn.addEventListener('click', setupGame);

    // Initialize
    initThemes();
    setupGame();
  </script>
</body>
</html>
